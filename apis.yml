name: Raymond James Financial
description: >-
  Raymond James Financial is a diversified financial services holding company
  headquartered in St. Petersburg, Florida, providing investment banking,
  wealth management, capital markets, asset management, and banking services
  to individuals, corporations, and municipalities. With more than 7,100
  financial advisors serving approximately 3 million client accounts and total
  client assets exceeding $637 billion, Raymond James is a Fortune 500 firm
  and one of the largest independent broker-dealers in the United States. The
  company offers client-facing portals and mobile apps for account management
  and reporting but does not publish a general-purpose public developer API or
  machine-readable specification at this time.
